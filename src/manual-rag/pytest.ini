[pytest]
# RAG Core Testing Configuration
# Keeps RAG tests separate from other contexts

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths (context-aware)
# When running: pytest tests/rag/
# It will ONLY run rag_core tests, not tagging tests

testpaths = 
    tests/rag
    tests/tagging

# Separate markers for different contexts
markers =
    rag: Tests for rag_core infrastructure
    tagging: Tests for rag_tools tagging
    integration: Integration tests across contexts

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# Run: pytest tests/rag/ --cov=rag_core --cov-report=html
