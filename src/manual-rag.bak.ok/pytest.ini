[pytest]
# RAG Testing Configuration
# Tests organized within their modules (not in root tests/ folder)

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths (organized by module)
testpaths = 
    rag_core/tests
    rag_tools/tagging/tests
    rag_tools/workflows/tests
    rag_tools/utils/tests

# Markers for different modules
markers =
    rag_core: RAG core infrastructure tests (indexing, query, metadata)
    tagging: RAG tools tagging workflow tests
    workflows: RAG tools workflow tests
    utils: RAG tools utilities tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# Run: pytest rag_core/tests --cov=rag_core
# Run: pytest rag_tools/tagging/tests --cov=rag_tools.tagging
