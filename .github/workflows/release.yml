name: Create GitHub Release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # criar/atualizar release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

