[pytest]
# Testing Configuration - Tests live in their modules
# Each module (rag_core, rag_tools) has its own tests/ directory

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths (each module has its own)
testpaths = 
    rag_core/tests
    rag_tools/tests

# Separate markers for different contexts
markers =
    rag: Tests for rag_core infrastructure
    tagging: Tests for rag_tools tagging
    integration: Integration tests across modules

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (when using --cov)
# Run: pytest rag_core/tests --cov=rag_core --cov-report=html
