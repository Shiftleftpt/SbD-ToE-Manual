pandoc_yaml:
  title: "Security by Design – Teoria de Tudo"
  date: "2025-07-31"
  geometry: a4paper
  fontsize: 12pt
  mainlanguage: portuguese
  header-includes:
    - \usepackage{tcolorbox}
    - \newtcolorbox{userstorypostit}{colback=yellow!25!white, colframe=orange!75!black, width=\textwidth, arc=3mm, boxrule=0.7pt, left=2mm, right=2mm, top=1mm, bottom=1mm, fonttitle=\bfseries, sharp corners=south, drop shadow, before skip=10pt,after skip=10pt}
  # Outras variáveis Eisvogel, etc.

filters:
  remove_print_only: true
  remove_web_only: true
  to_pdf: true
  to_web: false
  remove_emojis: true


