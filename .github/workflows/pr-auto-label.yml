name: Auto-label PR by template
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Detect template marker and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const title = context.payload.pull_request.title || "";
            function has(marker){ return body.includes(`<!--template: ${marker} -->`) || body.includes(`<!--template: ${marker}-->`); }
            const labels = [];
            if (has('conteudo-capitulo')) labels.push('tipo:feature', 'capítulo');
            if (has('revisao-editorial')) labels.push('tipo:documentação', 'editorial');
            if (has('correcao-bug')) labels.push('tipo:fix', 'build');
            if (has('atualizacao-checklists')) labels.push('tipo:documentação', 'checklist');
            if (has('infraestrutura-build')) labels.push('tipo:chore', 'ci');
            if (labels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels
                });
              } catch (e) {
                core.warning(`Falha ao aplicar labels: ${e.message}`);
              }
            } else {
              core.info('Nenhum marcador de template encontrado no corpo do PR.');
            }
