name: Preview (PR) — SbD-ToE

on:
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: pages-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: manuals_src/package-lock.json

      - name: Install deps (clean)
        working-directory: manuals_src
        run: npm ci

      - name: Build Docusaurus
        working-directory: manuals_src
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: manuals_src/build

      - name: Deploy preview
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          preview: true
